<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Accurate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
    }

    .clock {
      font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-shadow: 0 0 60px rgba(100, 200, 255, 0.3);
      user-select: none;
    }

    .status {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #666;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      transition: background 0.3s;
    }

    .status.synced::before {
      background: #44ff88;
      box-shadow: 0 0 10px #44ff88;
    }

    .toggle-container {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toggle-label {
      font-size: 0.875rem;
      color: #888;
    }

    .toggle {
      position: relative;
      width: 56px;
      height: 28px;
      background: #222;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle.active {
      background: #3a7bd5;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle.active::after {
      transform: translateX(28px);
    }

    .offset-display {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="clock" id="clock">--:--:--</div>
  <div class="status" id="status">Syncing...</div>
  <div class="toggle-container">
    <span class="toggle-label">12h</span>
    <div class="toggle" id="toggle" onclick="toggleFormat()"></div>
    <span class="toggle-label">24h</span>
  </div>
  <div class="offset-display" id="offset"></div>

  <script>
    let offset = 0;
    let is24Hour = false;
    const clockEl = document.getElementById('clock');
    const statusEl = document.getElementById('status');
    const toggleEl = document.getElementById('toggle');
    const offsetEl = document.getElementById('offset');

    function formatTime(date, is24) {
      const hours = date.getHours();
      const minutes = date.getMinutes();
      const seconds = date.getSeconds();
      
      if (is24Hour || is24) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      } else {
        const h = hours % 12 || 12;
        return `${h}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }
    }

    function updateClock() {
      const now = new Date(Date.now() + offset);
      clockEl.textContent = formatTime(now, !is24Hour);
    }

    function toggleFormat() {
      is24Hour = !is24Hour;
      toggleEl.classList.toggle('active', is24Hour);
      updateClock();
    }

    async function syncTime() {
      const clientBefore = Date.now();
      
      try {
        const response = await fetch('https://YOUR-WORKER-SUBDOMAIN.workers.dev/time');
        const data = await response.json();
        const clientAfter = Date.now();
        
        const roundTrip = clientAfter - clientBefore;
        const serverTimeAdjusted = data.time + (roundTrip / 2);
        offset = serverTimeAdjusted - clientAfter;
        
        statusEl.textContent = 'Synced';
        statusEl.classList.add('synced');
        offsetEl.textContent = `Offset: ${offset >= 0 ? '+' : ''}${offset}ms`;
        
        updateClock();
        setInterval(updateClock, 1000);
      } catch (error) {
        statusEl.textContent = 'Sync failed - using local time';
        console.error('Time sync error:', error);
        updateClock();
        setInterval(updateClock, 1000);
      }
    }

    syncTime();
  </script>
</body>
</html>
